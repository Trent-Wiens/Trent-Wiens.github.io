<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trent's Top Ten Albums - All Years">
    <title>Trent's Top Ten</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            font-family: "Inter", sans-serif;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .title {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 60px;
        }

        .years {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
        }

        .year-card {
            position: relative;
            width: 220px;
            height: 280px;
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: #f0f0f0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .year-card:hover {
            transform: translateY(-6px);
            border-color: #e0e0e0;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .year-card .year {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .year-card .label {
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #999;
            margin-top: 8px;
        }

        .year-card.coming-soon {
            opacity: 0.35;
            pointer-events: none;
        }

        .year-card.coming-soon .label {
            color: #666;
        }

        @media (max-width: 520px) {
            h1 {
                font-size: 2.5rem;
            }

            .year-card {
                width: 160px;
                height: 220px;
            }

            .year-card .year {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <p class="title">Trent's</p>
    <h1>Top Ten</h1>

    <div class="years">
        <a href="2024/index.html" class="year-card">
            <span class="year">2024</span>
            <span class="label">Albums</span>
        </a>
        <a href="2025/index.html" class="year-card">
            <span class="year">2025</span>
            <span class="label">Albums</span>
        </a>
    </div>
</body>

</html>
